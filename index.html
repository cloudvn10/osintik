<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AI Human Tracker 60FPS</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>

<style>
    body { margin: 0; background: #000; color: #0f0; font-family: monospace; overflow: hidden; }
    #container { position: relative; width: 100vw; height: 85vh; overflow: hidden; }
    #video { width: 100%; height: 100%; object-fit: cover; position: absolute; }
    #canvas { width: 100%; height: 100%; position: absolute; z-index: 10; }
    
    .ui { position: absolute; bottom: 0; width: 100%; height: 15vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #0a100a; border-top: 2px solid #2d7a2d; z-index: 20; }
    .btns { display: flex; gap: 10px; }
    button { background: #1a1a1a; border: 1px solid #0f0; color: #0f0; padding: 12px 24px; border-radius: 8px; font-size: 14px; font-weight: bold; cursor: pointer; }
    button:active { background: #0f0; color: #000; }
    
    #status-bar { position: absolute; top: 10px; left: 10px; z-index: 30; background: rgba(0,0,0,0.7); padding: 5px; border-radius: 4px; font-size: 10px; pointer-events: none; }
    .mirror { transform: scaleX(-1); }
</style>
</head>
<body>

<div id="status-bar">Инициализация...</div>

<div id="container">
    <video id="video" playsinline autoplay muted></video>
    <canvas id="canvas"></canvas>
</div>

<div class="ui">
    <div class="btns">
        <button id="start-btn" onclick="startApp()">▶ ЗАПУСТИТЬ ТРЕКЕР</button>
        <button id="flip-btn" onclick="flipCamera()" style="display: none;">🔄 СМЕНИТЬ КАМЕРУ</button>
    </div>
</div>

<script>
const tg = window.Telegram?.WebApp;
if (tg) tg.expand();

const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const statusEl = document.getElementById('status-bar');
const flipBtn = document.getElementById('flip-btn');
const startBtn = document.getElementById('start-btn');

let pose, camera;
let currentStream;
let facingMode = "environment"; // Начинаем с задней камеры
let isTrackerStarted = false;

// FPS калькулятор
let lastFrameTime = performance.now();
let fps = 0;

// Инициализация MediaPipe Pose (самая легкая модель для скорости)
function initPose() {
    pose = new Pose({locateFile: (file) => {
        return `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`;
    }});
    
    pose.setOptions({
        modelComplexity: 0, // 0 = 'lite' (самая быстрая, 60FPS), 1 = 'full'
        smoothLandmarks: true,
        minDetectionConfidence: 0.5,
        minTrackingConfidence: 0.5
    });
    
    pose.onResults(onResults);
}

// Запуск приложения
async function startApp() {
    if (isTrackerStarted) return;
    isTrackerStarted = true;
    startBtn.style.display = "none";
    
    statusEl.innerText = "ЗАПУСК КАМЕРЫ...";
    initPose();
    await setupCamera();
    
    camera = new Camera(video, {
        onFrame: async () => {
            // FPS замер
            const now = performance.now();
            fps = Math.round(1000 / (now - lastFrameTime));
            lastFrameTime = now;
            statusEl.innerText = `FPS: ${fps} | РЕЖИМ: ${facingMode === 'user' ? 'СЕЛФИ' : 'ОСНОВНАЯ'}`;
            
            await pose.send({image: video});
        },
        width: 1280, // Широкое разрешение (ideal)
        height: 720
    });
    camera.start();
    flipBtn.style.display = "block";
}

// Настройка камеры с принудительным убийством старого потока
async function setupCamera() {
    if (currentStream) {
        currentStream.getTracks().forEach(track => track.stop());
        video.srcObject = null;
    }
    
    const constraints = { 
        video: { 
            facingMode: { ideal: facingMode },
            width: { ideal: 1280 },
            height: { ideal: 720 }
        } 
    };

    try {
        currentStream = await navigator.mediaDevices.getUserMedia(constraints);
        video.srcObject = currentStream;

        // Зеркалка только для фронталки
        if (facingMode === "user") {
            video.classList.add('mirror');
            canvas.classList.add('mirror');
        } else {
            video.classList.remove('mirror');
            canvas.classList.remove('mirror');
        }

        return new Promise(resolve => video.onloadedmetadata = resolve);
    } catch (err) {
        statusEl.innerText = "❌ ОШИБКА КАМЕРЫ";
    }
}

// Смена камеры
async function flipCamera() {
    statusEl.innerText = "ПЕРЕКЛЮЧЕНИЕ КАМЕРЫ...";
    facingMode = facingMode === "user" ? "environment" : "user";
    await setupCamera();
}

// Отрисовка результатов (сердце трекера)
function onResults(results) {
    if (!results.poseLandmarks) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        return;
    }

    // Подгоняем размер холста под видео поток
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Убираем зеркальность для текста на фронталке
    ctx.save();
    if (facingMode === "user") {
        ctx.translate(canvas.width, 0);
        ctx.scale(-1, 1);
    }

    // --- 1. Отрисовка скелета ( MediaPipe Drawing Utils) ---
    drawConnectors(ctx, results.poseLandmarks, POSE_CONNECTIONS,
                 {color: '#00ff44', lineWidth: 3});
    drawLandmarks(ctx, results.poseLandmarks,
                {color: '#ff0000', lineWidth: 1, radius: 2});

    // --- 2. Вычисление прямоугольника (Bounding Box) ---
    const landmarks = results.poseLandmarks;
    let minX = canvas.width, minY = canvas.height, maxX = 0, maxY = 0;
    
    // Перебираем точки (пропускаем лицо для точности торса)
    for (let i = 11; i < landmarks.length; i++) { 
        const lm = landmarks[i];
        const x = lm.x * canvas.width;
        const y = lm.y * canvas.height;
        if (x < minX) minX = x;
        if (y < minY) minY = y;
        if (x > maxX) maxX = x;
        if (y > maxY) maxY = y;
    }

    // Добавляем отступы
    const width = maxX - minX;
    const height = maxY - minY;
    minX -= width * 0.1; minY -= height * 0.1;
    maxX += width * 0.1; maxY += height * 0.1;

    // --- 3. Рисуем прямоугольник ---
    ctx.strokeStyle = '#00ff44';
    ctx.lineWidth = 4;
    ctx.strokeRect(minX, minY, maxX - minX, maxY - minY);

    // --- 4. Отрисовка данных над головой ---
    const headLm = landmarks[0]; // Точка носа
    const dataX = headLm.x * canvas.width;
    const dataY = (headLm.y * canvas.height) - 40; // Чуть выше головы

    // Расчет данных
    const centerCoords = `[X:${Math.round(headLm.x * 100)}, Y:${Math.round(headLm.y * 100)}]`;
    // Простой расчет роста: расстояние от головы до пяток в пикселях холста
    const heelLm = landmarks[29]; // Пятка
    const pixelHeight = Math.round(Math.abs(heelLm.y - headLm.y) * canvas.height);
    const growth = `РОСТ:${pixelHeight}px`;
    const score = `HUMAN:${Math.round(headLm.visibility * 100)}%`;
    
    const textData = `${score} | ${growth} | ${centerCoords}`;

    drawDataLabel(dataX, dataY, textData);

    ctx.restore();
}

function drawDataLabel(x, y, text) {
    ctx.font = "bold 14px monospace";
    ctx.fillStyle = "#00ff44"; // Плашка
    const textWidth = ctx.measureText(text).width;
    ctx.fillRect(x - (textWidth/2) - 5, y - 20, textWidth + 10, 25);
    
    ctx.fillStyle = "#000"; // Текст
    ctx.fillText(text, x - (textWidth/2), y);
}
</script>
</body>
</html>
