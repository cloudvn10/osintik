<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AI Object Detector RU</title>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
<style>
    body { margin: 0; background: #000; color: #0f0; font-family: monospace; overflow: hidden; }
    #video { width: 100vw; height: 85vh; object-fit: cover; position: absolute; top: 0; left: 0; }
    #canvas { width: 100vw; height: 85vh; position: absolute; top: 0; left: 0; z-index: 10; }
    .ui { position: absolute; bottom: 0; width: 100%; height: 15vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #0a100a; border-top: 2px solid #2d7a2d; }
    .btns { display: flex; gap: 10px; }
    button { background: #1a1a1a; border: 1px solid #0f0; color: #0f0; padding: 12px 24px; border-radius: 8px; font-size: 14px; font-weight: bold; }
    #status { font-size: 12px; margin-bottom: 8px; color: #00ff44; }
    .mirror { transform: scaleX(-1); }
</style>
</head>
<body>

<video id="video" playsinline autoplay muted></video>
<canvas id="canvas"></canvas>

<div class="ui">
    <div id="status">Загрузка ИИ...</div>
    <div class="btns">
        <button id="start-btn" onclick="startApp()">ЗАПУСТИТЬ</button>
        <button id="flip-btn" onclick="flipCamera()" style="display: none;">СМЕНИТЬ КАМЕРУ</button>
    </div>
</div>

<script>
// Словарь перевода (можешь добавлять свои слова сюда)
const TRANSLATIONS = {
    "person": "ЧЕЛОВЕК",
    "chair": "СТУЛ",
    "bottle": "БУТЫЛКА",
    "cup": "КРУЖКА",
    "cell phone": "ТЕЛЕФОН",
    "laptop": "НОУТБУК",
    "mouse": "МЫШКА",
    "keyboard": "КЛАВИАТУРА",
    "remote": "ПУЛЬТ",
    "book": "КНИГА",
    "clock": "ЧАСЫ",
    "potted plant": "РАСТЕНИЕ",
    "backpack": "РЮКЗАК",
    "handbag": "СУМКА",
    "bottle": "БУТЫЛКА",
    "tv": "ТЕЛЕВИЗОР",
    "refrigerator": "ХОЛОДИЛЬНИК",
    "cup": "ЧАШКА",
    "fork": "ВИЛКА",
    "knife": "НОЖ",
    "spoon": "ЛОЖКА",
    "bowl": "МИСКА",
    "apple": "ЯБЛОКО",
    "banana": "БАНАН",
    "orange": "АПЕЛЬСИН",
    "broccoli": "БРОККОЛИ",
    "carrot": "МОРКОВЬ",
    "pizza": "ПИЦЦА",
    "cake": "ТОРТ",
    "couch": "ДИВАН",
    "bed": "КРОВАТЬ",
    "toilet": "УНИТАЗ",
    "scissors": "НОЖНИЦЫ",
    "toothbrush": "ЗУБНАЯ ЩЕТКА"
};

let model, currentStream, 
    video = document.getElementById('video'), 
    canvas = document.getElementById('canvas'), 
    ctx = canvas.getContext('2d'), 
    status = document.getElementById('status'), 
    flipBtn = document.getElementById('flip-btn'), 
    startBtn = document.getElementById('start-btn'),
    facingMode = "user";

async function loadModel() {
    try {
        model = await cocoSsd.load();
        status.innerText = "ИИ ГОТОВ";
    } catch (e) {
        status.innerText = "ОШИБКА ЗАГРУЗКИ МОДЕЛИ";
    }
}
loadModel();

async function startApp() {
    await setupCamera();
    startBtn.style.display = "none";
    flipBtn.style.display = "block";
    detect();
}

async function setupCamera() {
    if (currentStream) currentStream.getTracks().forEach(t => t.stop());
    
    const constraints = { 
        video: { 
            facingMode: { exact: facingMode === "user" ? "user" : "environment" } 
        } 
    };

    try {
        currentStream = await navigator.mediaDevices.getUserMedia(constraints);
    } catch (err) {
        // Если 'exact' не сработал (на ПК), пробуем обычный режим
        currentStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: facingMode } });
    }

    video.srcObject = currentStream;

    if (facingMode === "user") {
        video.classList.add('mirror');
        canvas.classList.add('mirror');
    } else {
        video.classList.remove('mirror');
        canvas.classList.remove('mirror');
    }
}

async function flipCamera() {
    facingMode = facingMode === "user" ? "environment" : "user";
    status.innerText = "ПЕРЕКЛЮЧЕНИЕ КАМЕРЫ...";
    await setupCamera();
    status.innerText = "РЕЖИМ: " + (facingMode === "user" ? "СЕЛФИ" : "ОСНОВНАЯ");
}

async function detect() {
    if (!model) return;

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    
    const predictions = await model.detect(video);
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    predictions.forEach(p => {
        const x = p.bbox[0];
        const y = p.bbox[1];
        const w = p.bbox[2];
        const h = p.bbox[3];

        // Рисуем рамку
        ctx.strokeStyle = "#0f0";
        ctx.lineWidth = 5;
        ctx.strokeRect(x, y, w, h);
        
        // Перевод названия
        const englishName = p.class.toLowerCase();
        const russianName = TRANSLATIONS[englishName] || englishName.toUpperCase();
        
        // Рисуем плашку под текст
        ctx.fillStyle = "#0f0";
        ctx.font = "bold 20px Arial";
        const textWidth = ctx.measureText(russianName).width;
        ctx.fillRect(x, y > 30 ? y - 30 : y, textWidth + 10, 30);

        // Текст названия
        ctx.fillStyle = "#000";
        ctx.fillText(russianName, x + 5, y > 30 ? y - 8 : y + 22);
    });
    
    requestAnimationFrame(detect);
}
</script>
</body>
</html>
