<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pepe App</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0f0a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    overflow: hidden;
    font-family: monospace;
  }

  /* Фон с зелёными точками */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: radial-gradient(circle, rgba(34,85,34,0.15) 1px, transparent 1px);
    background-size: 30px 30px;
    pointer-events: none;
  }

  /* Пепе гифка без белого фона */
  .pepe-wrap {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .pepe-img {
    width: 280px;
    height: 280px;
    object-fit: contain;
    /* Убираем белый фон через mix-blend-mode */
    mix-blend-mode: screen;
    filter: hue-rotate(0deg) saturate(1.2);
  }

  /* Зелёное свечение */
  .pepe-glow {
    position: absolute;
    width: 260px;
    height: 260px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(34,120,34,0.25) 0%, transparent 70%);
    animation: pulse 2s ease-in-out infinite;
    pointer-events: none;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 0.5; }
    50% { transform: scale(1.1); opacity: 1; }
  }

  /* Юзернейм */
  .username {
    margin-top: 30px;
    color: #2d7a2d;
    font-size: 18px;
    letter-spacing: 3px;
    text-shadow: 0 0 10px rgba(45,122,45,0.8);
    animation: blink 3s ease-in-out infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 0.7; }
    50% { opacity: 1; text-shadow: 0 0 20px rgba(45,200,45,0.9); }
  }

  /* Декор линии */
  .line {
    width: 200px;
    height: 1px;
    background: linear-gradient(90deg, transparent, #2d7a2d, transparent);
    margin: 15px 0;
    opacity: 0.6;
  }
</style>
</head>
<body>

<div class="pepe-wrap">
  <div class="pepe-glow"></div>
  <img class="pepe-img"
    src="https://i.ibb.co/WW50MJxt/pepe.gif"
    alt="Pepe"
  />
</div>

<div class="line"></div>
<div class="username">@libappso</div>

<script>
  const tg = window.Telegram?.WebApp;
  if (tg) tg.expand();
</script>
</body>
</html>
