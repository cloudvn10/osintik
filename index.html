<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Object Detector RU</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; background: #0a0f0a; font-family: monospace; }
  .pages { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; }
  .pages::-webkit-scrollbar { display: none; }
  .page { height: 100vh; scroll-snap-align: start; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
  .camera-container { position: relative; width: 95%; max-width: 420px; height: 70vh; background: #000; border-radius: 15px; overflow: hidden; border: 1px solid #2d7a2d; }
  #video { width: 100%; height: 100%; object-fit: cover; }
  #canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
  .controls { display: flex; gap: 10px; margin-top: 15px; }
  button { background: transparent; border: 1px solid #00ff44; color: #00ff44; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-size: 12px; letter-spacing: 1px; font-weight: bold; }
  .status { margin-top: 10px; color: #00ff44; font-size: 11px; text-transform: uppercase; }
  .mirror { transform: scaleX(-1); }
</style>
</head>
<body>

<div class="pages">
  <div class="page">
    <div style="color: #2d7a2d; text-align: center;">
      <h1 style="font-size: 24px; margin-bottom: 10px;">OBJECT AI RU</h1>
      <p style="opacity: 0.6;">Свайпни вниз для запуска</p>
      <div style="margin-top: 20px; font-size: 30px;">▼</div>
    </div>
  </div>

  <div class="page" id="scanner">
    <div class="camera-container">
      <video id="video" playsinline autoplay muted></video>
      <canvas id="canvas"></canvas>
    </div>
    <div class="status" id="status">Загрузка нейросети...</div>
    <div class="controls">
      <button id="start-btn" onclick="initScanner()">▶ ЗАПУСК</button>
      <button id="switch-btn" onclick="switchCamera()" style="display:none;">🔄 СМЕНИТЬ КАМЕРУ</button>
    </div>
  </div>
</div>

<script>
const tg = window.Telegram?.WebApp;
if (tg) tg.expand();

// Словарь для перевода объектов
const RU_LABELS = {
    'person': 'ЧЕЛОВЕК', 'chair': 'СТУЛ', 'table': 'СТОЛ', 'bottle': 'БУТЫЛКА',
    'cup': 'КРУЖКА', 'laptop': 'НОУТБУК', 'mouse': 'МЫШКА', 'keyboard': 'КЛАВИАТУРА',
    'cell phone': 'ТЕЛЕФОН', 'calculator': 'КАЛЬКУЛЯТОР', 'cookies': 'ПЕЧЕНЬЕ',
    't-shirt': 'ФУТБОЛКА', 'backpack': 'РЮКЗАК', 'book': 'КНИГА', 'tv': 'ТВ',
    'remote': 'ПУЛЬТ', 'scissors': 'НОЖНИЦЫ', 'toothbrush': 'ЗУБНАЯ ЩЕТКА'
};

const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const statusEl = document.getElementById('status');
const switchBtn = document.getElementById('switch-btn');
const startBtn = document.getElementById('start-btn');

let model = null;
let currentStream = null;
let facingMode = "user"; 

async function loadModel() {
    statusEl.textContent = "⚙️ ЗАГРУЗКА МОДЕЛИ...";
    model = await cocoSsd.load();
    statusEl.textContent = "✅ ГОТОВО";
}
loadModel();

async function initScanner() {
    startBtn.style.display = 'none';
    switchBtn.style.display = 'block';
    await startStream();
    predict();
}

async function startStream() {
    if (currentStream) {
        currentStream.getTracks().forEach(track => track.stop());
    }

    // Параметры камеры: на мобилках лучше работает точное указание
    const constraints = {
        video: { 
            facingMode: { ideal: facingMode },
            width: { ideal: 640 },
            height: { ideal: 480 }
        }
    };

    try {
        currentStream = await navigator.mediaDevices.getUserMedia(constraints);
        video.srcObject = currentStream;

        if (facingMode === "user") {
            video.classList.add('mirror');
            canvas.classList.add('mirror');
        } else {
            video.classList.remove('mirror');
            canvas.classList.remove('mirror');
        }

        return new Promise((resolve) => {
            video.onloadedmetadata = () => resolve();
        });
    } catch (e) {
        statusEl.textContent = "❌ ОШИБКА КАМЕРЫ";
    }
}

async function switchCamera() {
    facingMode = (facingMode === "user") ? "environment" : "user";
    statusEl.textContent = "🔄 ПЕРЕКЛЮЧЕНИЕ...";
    await startStream();
    statusEl.textContent = "✅ КАМЕРА: " + (facingMode === "user" ? "СЕЛФИ" : "ОСНОВНАЯ");
}

async function predict() {
    if (!model) return;

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    const predictions = await model.detect(video);
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    predictions.forEach(prediction => {
        const [x, y, width, height] = prediction.bbox;
        const rawLabel = prediction.class;
        // Берем перевод или оставляем оригинал
        const label = RU_LABELS[rawLabel] || rawLabel.toUpperCase();
        const score = Math.round(prediction.score * 100);

        ctx.strokeStyle = "#00ff44";
        ctx.lineWidth = 4;
        ctx.strokeRect(x, y, width, height);

        ctx.fillStyle = "#00ff44";
        ctx.font = "bold 18px monospace";
        const text = `${label} ${score}%`;
        const textWidth = ctx.measureText(text).width;
        
        ctx.fillRect(x, y > 25 ? y - 30 : y, textWidth + 10, 30);
        ctx.fillStyle = "#000";
        ctx.fillText(text, x + 5, y > 25 ? y - 8 : y + 20);
    });

    requestAnimationFrame(predict);
}
</script>
</body>
</html>
