<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pepe App</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html,body { height:100%; overflow:hidden; background:#0a0f0a; }

.pages {
  height:100vh; overflow-y:scroll;
  scroll-snap-type:y mandatory; scroll-behavior:smooth;
}
.pages::-webkit-scrollbar { display:none; }

.page {
  height:100vh; scroll-snap-align:start;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  position:relative;
}
.page::before {
  content:''; position:absolute; inset:0;
  background-image:radial-gradient(circle,rgba(34,85,34,0.15) 1px,transparent 1px);
  background-size:30px 30px; pointer-events:none;
}

/* PAGE 1 */
.pepe-glow {
  position:absolute; width:260px; height:260px; border-radius:50%;
  background:radial-gradient(circle,rgba(34,120,34,0.25) 0%,transparent 70%);
  animation:pulse 2s ease-in-out infinite; pointer-events:none;
}
@keyframes pulse { 0%,100%{transform:scale(1);opacity:.5} 50%{transform:scale(1.1);opacity:1} }
.pepe-wrap { position:relative; display:flex; align-items:center; justify-content:center; }
.pepe-img { width:280px; height:280px; object-fit:contain; }
.username { margin-top:20px; color:#2d7a2d; font-size:18px; letter-spacing:3px; font-family:monospace; text-shadow:0 0 10px rgba(45,122,45,.8); }
.line { width:200px; height:1px; background:linear-gradient(90deg,transparent,#2d7a2d,transparent); margin:12px 0; opacity:.6; }
.swipe-hint { position:absolute; bottom:25px; color:rgba(45,122,45,.5); font-family:monospace; font-size:12px; letter-spacing:2px; animation:bounce 2s ease-in-out infinite; }
@keyframes bounce { 0%,100%{transform:translateY(0);opacity:.5} 50%{transform:translateY(6px);opacity:1} }

/* PAGE 2 */
#page2 { background:#050a05; }
.cam-label { color:rgba(45,122,45,.7); font-family:monospace; font-size:11px; letter-spacing:3px; margin-bottom:8px; }

.camera-container { position:relative; width:100%; max-width:420px; height:68vh; }

#video {
  width:100%; height:100%;
  object-fit:cover;
  border-radius:10px;
  /* Яркость и контраст для темноты */
  filter: brightness(1.8) contrast(1.3) saturate(0.8);
}

#canvas {
  position:absolute; top:0; left:0;
  width:100%; height:100%;
  border-radius:10px;
}

.bottom-bar {
  display:flex; gap:10px; margin-top:8px; align-items:center;
}
.status-txt { font-family:monospace; font-size:10px; color:rgba(45,122,45,.6); letter-spacing:1px; }

#start-btn, #flip-btn {
  background:transparent; border:1px solid #2d7a2d;
  color:#2d7a2d; font-family:monospace; font-size:11px;
  letter-spacing:2px; padding:7px 16px; border-radius:5px;
  cursor:pointer;
}
</style>
</head>
<body>
<div class="pages">

<!-- PAGE 1 -->
<div class="page" id="page1">
  <div class="pepe-wrap">
    <div class="pepe-glow"></div>
    <img class="pepe-img" src="https://i.ibb.co/WW50MJxt/pepe.gif" alt="Pepe"/>
  </div>
  <div class="line"></div>
  <div class="username">@libappso</div>
  <div class="swipe-hint">▼ свайп вниз</div>
</div>

<!-- PAGE 2 -->
<div class="page" id="page2">
  <div class="cam-label">⬡ POSE DETECTION ⬡</div>
  <div class="camera-container">
    <video id="video" playsinline autoplay muted></video>
    <canvas id="canvas"></canvas>
  </div>
  <div class="bottom-bar">
    <div class="status-txt" id="status-txt">Нажми запустить</div>
    <button id="flip-btn" onclick="flipCamera()" style="display:none">⟳ FLIP</button>
    <button id="start-btn" onclick="startCamera()">▶ СТАРТ</button>
  </div>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>

<script>
const tg = window.Telegram?.WebApp;
if (tg) tg.expand();

const video    = document.getElementById('video');
const canvas   = document.getElementById('canvas');
const ctx      = canvas.getContext('2d');
const statusEl = document.getElementById('status-txt');
const startBtn = document.getElementById('start-btn');
const flipBtn  = document.getElementById('flip-btn');

let facingMode = 'environment'; // задняя камера
let currentStream = null;
let mpCamera = null;
let pose = null;

// Плавные точки (lerp)
let smoothLandmarks = null;
const SMOOTH = 0.35; // скорость сглаживания (0=стоит, 1=мгновенно)

function lerp(a, b, t) { return a + (b - a) * t; }

function smoothPose(current, prev) {
  if (!prev) return current;
  return current.map((lm, i) => ({
    x: lerp(prev[i].x, lm.x, SMOOTH),
    y: lerp(prev[i].y, lm.y, SMOOTH),
    z: lerp(prev[i].z, lm.z, SMOOTH),
    visibility: lm.visibility
  }));
}

function onResults(results) {
  canvas.width  = video.videoWidth  || 640;
  canvas.height = video.videoHeight || 480;
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (!results.poseLandmarks) {
    statusEl.textContent = '⟳ ПОИСК...';
    smoothLandmarks = null;
    return;
  }

  // Сглаживание
  smoothLandmarks = smoothPose(results.poseLandmarks, smoothLandmarks);

  // Зеркало для задней камеры — не инвертируем
  // Для передней — инвертируем canvas
  if (facingMode === 'user') {
    ctx.save();
    ctx.translate(canvas.width, 0);
    ctx.scale(-1, 1);
  }

  // Рисуем скелет
  drawConnectors(ctx, smoothLandmarks, POSE_CONNECTIONS, {
    color: 'rgba(0,255,68,0.8)',
    lineWidth: 2.5
  });
  drawLandmarks(ctx, smoothLandmarks, {
    color: 'rgba(0,255,68,0.9)',
    fillColor: 'rgba(0,40,0,0.8)',
    lineWidth: 1,
    radius: 5
  });

  if (facingMode === 'user') ctx.restore();

  statusEl.textContent = '✓ ЧЕЛОВЕК НАЙДЕН';
}

async function startCamera() {
  startBtn.style.display = 'none';
  statusEl.textContent = '⟳ ЗАГРУЗКА...';

  try {
    if (currentStream) {
      currentStream.getTracks().forEach(t => t.stop());
    }

    currentStream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: facingMode,
        width: { ideal: 640 },
        height: { ideal: 480 },
        frameRate: { ideal: 30 }
      }
    });
    video.srcObject = currentStream;

    if (!pose) {
      pose = new Pose({
        locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}`
      });
      pose.setOptions({
        modelComplexity: 0,        // 0 = самая быстрая модель
        smoothLandmarks: true,
        enableSegmentation: false,
        minDetectionConfidence: 0.5,
        minTrackingConfidence: 0.5
      });
      pose.onResults(onResults);
    }

    if (mpCamera) mpCamera.stop();

    mpCamera = new Camera(video, {
      onFrame: async () => { await pose.send({ image: video }); },
      width: 640,
      height: 480
    });
    mpCamera.start();

    flipBtn.style.display = 'block';
    statusEl.textContent = '⟳ ПОИСК...';

  } catch (e) {
    statusEl.textContent = '✗ НЕТ КАМЕРЫ';
    startBtn.style.display = 'block';
  }
}

function flipCamera() {
  facingMode = facingMode === 'user' ? 'environment' : 'user';
  // Зеркалим видео для передней камеры
  video.style.transform = facingMode === 'user' ? 'scaleX(-1)' : 'scaleX(1)';
  startCamera();
}
</script>
</body>
</html>
