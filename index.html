<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AI Object Detector RU</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>

<style>
    body { margin: 0; background: #000; color: #0f0; font-family: monospace; overflow: hidden; }
    #video { width: 100vw; height: 85vh; object-fit: cover; position: absolute; top: 0; left: 0; }
    #canvas { width: 100vw; height: 85vh; position: absolute; top: 0; left: 0; z-index: 10; }
    .ui { position: absolute; bottom: 0; width: 100%; height: 15vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #0a100a; border-top: 2px solid #2d7a2d; z-index: 20; }
    .btns { display: flex; gap: 10px; }
    button { background: #1a1a1a; border: 1px solid #0f0; color: #0f0; padding: 12px 24px; border-radius: 8px; font-size: 14px; font-weight: bold; cursor: pointer; }
    #status { font-size: 12px; margin-bottom: 8px; color: #00ff44; font-weight: bold; }
    /* Зеркалка только для селфи */
    .mirror { transform: scaleX(-1); }
</style>
</head>
<body>

<video id="video" playsinline autoplay muted></video>
<canvas id="canvas"></canvas>

<div class="ui">
    <div id="status">ЗАГРУЗКА ИИ...</div>
    <div class="btns">
        <button id="start-btn" onclick="startApp()">ЗАПУСТИТЬ</button>
        <button id="flip-btn" onclick="flipCamera()" style="display: none;">СМЕНИТЬ КАМЕРУ</button>
    </div>
</div>

<script>
const tg = window.Telegram?.WebApp;
if (tg) tg.expand();

// Словарь
const RU_LABELS = {
    'person': 'ЧЕЛОВЕК', 'chair': 'СТУЛ', 'table': 'СТОЛ', 'bottle': 'БУТЫЛКА',
    'cup': 'КРУЖКА', 'laptop': 'НОУТБУК', 'mouse': 'МЫШКА', 'keyboard': 'КЛАВИАТУРА',
    'cell phone': 'ТЕЛЕФОН', 'calculator': 'КАЛЬКУЛЯТОР', 'cookies': 'ПЕЧЕНЬЕ',
    't-shirt': 'ФУТБОЛКА', 'backpack': 'РЮКЗАК', 'book': 'КНИГА', 'tv': 'ТВ',
    'remote': 'ПУЛЬТ', 'scissors': 'НОЖНИЦЫ', 'toothbrush': 'ЗУБНАЯ ЩЕТКА',
    'toilet': 'УНИТАЗ', 'bed': 'КРОВАТЬ', 'couch': 'ДИВАН', 'apple': 'ЯБЛОКО'
};

let model, currentStream;
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const statusEl = document.getElementById('status');
const flipBtn = document.getElementById('flip-btn');
const startBtn = document.getElementById('start-btn');

// Начинаем сразу с задней камеры
let facingMode = "environment"; 

async function loadModel() {
    try {
        model = await cocoSsd.load();
        statusEl.innerText = "ИИ ГОТОВ";
    } catch (e) {
        statusEl.innerText = "ОШИБКА ЗАГРУЗКИ МОДЕЛИ";
    }
}
loadModel();

async function startApp() {
    startBtn.style.display = "none";
    flipBtn.style.display = "block";
    await setupCamera();
    detect();
}

async function setupCamera() {
    // Жестко убиваем старый поток для Telegram WebApp
    if (currentStream) {
        currentStream.getTracks().forEach(track => track.stop());
        video.srcObject = null;
    }
    
    const constraints = { 
        video: { facingMode: facingMode } 
    };

    try {
        currentStream = await navigator.mediaDevices.getUserMedia(constraints);
        video.srcObject = currentStream;

        // Ждем, пока видео реально запустится
        await new Promise(resolve => {
            video.onloadedmetadata = () => {
                video.play();
                resolve();
            };
        });

        if (facingMode === "user") {
            video.classList.add('mirror');
            canvas.classList.add('mirror');
        } else {
            video.classList.remove('mirror');
            canvas.classList.remove('mirror');
        }
    } catch (err) {
        statusEl.innerText = "ОШИБКА ДОСТУПА К КАМЕРЕ";
    }
}

async function flipCamera() {
    statusEl.innerText = "ПЕРЕКЛЮЧЕНИЕ...";
    facingMode = facingMode === "user" ? "environment" : "user";
    await setupCamera();
    statusEl.innerText = facingMode === "user" ? "РЕЖИМ: СЕЛФИ" : "РЕЖИМ: ОСНОВНАЯ";
}

async function detect() {
    if (!model) return;

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    
    const predictions = await model.detect(video);
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    predictions.forEach(p => {
        const score = p.score;
        
        // ФИЛЬТР: Игнорируем всё, в чем ИИ не уверен на 60%
        if (score < 0.60) return;

        const x = p.bbox[0];
        const y = p.bbox[1];
        const w = p.bbox[2];
        const h = p.bbox[3];

        const rawLabel = p.class;
        const label = RU_LABELS[rawLabel] || rawLabel.toUpperCase();
        const scorePercent = Math.round(score * 100);
        const text = `${label} ${scorePercent}%`;

        // Рамка
        ctx.strokeStyle = "#00ff44";
        ctx.lineWidth = 4;
        ctx.strokeRect(x, y, w, h);
        
        // Исправление зеркального текста для фронталки
        ctx.save();
        if (facingMode === "user") {
            ctx.translate(canvas.width, 0);
            ctx.scale(-1, 1);
            const mirroredX = canvas.width - x - ctx.measureText(text).width - 10;
            drawLabel(mirroredX, y, text);
        } else {
            drawLabel(x, y, text);
        }
        ctx.restore();
    });
    
    requestAnimationFrame(detect);
}

function drawLabel(x, y, text) {
    ctx.font = "bold 16px monospace";
    const textWidth = ctx.measureText(text).width;
    
    ctx.fillStyle = "#00ff44";
    ctx.fillRect(x, y > 25 ? y - 25 : y, textWidth + 10, 25);
    
    ctx.fillStyle = "#000";
    ctx.fillText(text, x + 5, y > 25 ? y - 8 : y + 18);
}
</script>
</body>
</html>
