<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Advanced AR Hand Interface</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        #canvas-container { position: relative; width: 100vw; height: 100vh; }
        /* Зеркалим видео и 3D для естественного управления */
        canvas, video { transform: scaleX(-1); position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        #ui {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.7); color: #0ff; padding: 15px 25px;
            border-radius: 30px; border: 1px solid #0ff; pointer-events: none;
            text-align: center; text-transform: uppercase; letter-spacing: 2px;
            box-shadow: 0 0 15px #0ff; z-index: 100;
        }
    </style>
</head>
<body>

<div id="ui">ЖЕСТЫ: Кольцо (4-12) - Размер | Щелчок (8) - Поставить</div>
<video id="input_video" style="display:none"></video>
<div id="canvas-container"></div>

<script>
// --- НАСТРОЙКА THREE.JS ---
const container = document.getElementById('canvas-container');
const scene = new THREE.Scene();
const camera3D = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
container.appendChild(renderer.domElement);

// Создаем футуристичный куб
const geometry = new THREE.BoxGeometry(1, 1, 1);
const material = new THREE.MeshBasicMaterial({ 
    color: 0x00ffcc, 
    wireframe: true, 
    transparent: true, 
    opacity: 0.8 
});
const cube = new THREE.Mesh(geometry, material);
scene.add(cube);

// Добавим внутренний светящийся блок
const innerBox = new THREE.Mesh(
    new THREE.BoxGeometry(0.8, 0.8, 0.8),
    new THREE.MeshBasicMaterial({ color: 0x00ffcc, transparent: true, opacity: 0.2 })
);
cube.add(innerBox);

camera3D.position.z = 5;

// --- ЛОГИКА ПРИЛОЖЕНИЯ ---
let isPlaced = false;
let lastSize = 1;
let cooldown = 0;

function onResults(results) {
    renderer.render(scene, camera3D);

    if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
        const hand = results.multiHandLandmarks[0];
        
        // Точки (landmarks)
        const thumb = hand[4];  // Большой
        const indexTip = hand[8]; // Указательный кончик
        const indexPip = hand[6]; // Указательный фаланга
        const middle = hand[12]; // Средний

        // 1. Координаты блока (перевод из 0-1 в координаты Three.js)
        if (!isPlaced) {
            // Масштабируем координаты под экран (от -5 до 5 примерно)
            cube.position.x = (indexTip.x - 0.5) * 10;
            cube.position.y = -(indexTip.y - 0.5) * 6;
            
            // Плавное вращение куба за движением руки
            cube.rotation.y += 0.05;
            cube.rotation.x = (indexTip.y - 0.5) * 2;
        }

        // 2. Размер (расстояние между большим и средним)
        const dist = Math.hypot(thumb.x - middle.x, thumb.y - middle.y);
        const targetSize = dist * 10;
        // Сглаживание размера (Lerp)
        lastSize += (targetSize - lastSize) * 0.2;
        cube.scale.set(lastSize, lastSize, lastSize);

        // 3. Детекция клика (Указательный палец)
        // Если кончик пальца (8) ниже фаланги (6) по оси Y
        if (indexTip.y > indexPip.y && cooldown === 0) {
            isPlaced = !isPlaced;
            cooldown = 25; // Задержка, чтобы не было дребезга
            
            // Визуальный эффект клика
            cube.material.color.setHex(isPlaced ? 0xff0055 : 0x00ffcc);
            innerBox.material.color.setHex(isPlaced ? 0xff0055 : 0x00ffcc);
            document.getElementById('ui').innerText = isPlaced ? "ОБЪЕКТ ЗАКРЕПЛЕН" : "ОБЪЕКТ В РУКЕ";
        }
    }

    if (cooldown > 0) cooldown--;
}

// --- ЗАПУСК MEDIAPIPE ---
const hands = new Hands({
    locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
});

hands.setOptions({
    maxNumHands: 1,
    modelComplexity: 1,
    minDetectionConfidence: 0.8,
    minTrackingConfidence: 0.8
});

hands.onResults(onResults);

const videoElement = document.getElementById('input_video');
const camera = new Camera(videoElement, {
    onFrame: async () => {
        await hands.send({image: videoElement});
    },
    width: 1280,
    height: 720
});
camera.start();

// Обработка изменения размера окна
window.addEventListener('resize', () => {
    camera3D.aspect = window.innerWidth / window.innerHeight;
    camera3D.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
