<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pepe App</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; background: #0a0f0a; }

  .pages {
    height: 100vh;
    overflow-y: scroll;
    scroll-snap-type: y mandatory;
  }
  .pages::-webkit-scrollbar { display: none; }

  .page {
    height: 100vh;
    scroll-snap-align: start;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  .page::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: radial-gradient(circle, rgba(34,85,34,0.15) 1px, transparent 1px);
    background-size: 30px 30px;
    pointer-events: none;
  }

  /* PAGE 1 */
  .pepe-wrap { position: relative; }
  .pepe-glow {
    position: absolute; width: 260px; height: 260px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(34,120,34,0.25) 0%, transparent 70%);
    animation: pulse 2s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes pulse { 0%,100%{transform:scale(1);opacity:.5} 50%{transform:scale(1.1);opacity:1} }
  .pepe-img { width: 280px; height: 280px; object-fit: contain; }
  .line { width:200px; height:1px; background:linear-gradient(90deg,transparent,#2d7a2d,transparent); margin:12px 0; opacity:.6; }
  .username { color:#2d7a2d; font-size:18px; letter-spacing:3px; font-family:monospace; text-shadow:0 0 10px rgba(45,122,45,.8); }
  .swipe-hint { position:absolute; bottom:25px; color:rgba(45,122,45,.5); font-family:monospace; font-size:12px; letter-spacing:2px; animation:bounce 2s ease-in-out infinite; }
  @keyframes bounce { 0%,100%{transform:translateY(0);opacity:.5} 50%{transform:translateY(6px);opacity:1} }

  /* PAGE 2 */
  #page2 { background:#050a05; }
  .cam-label { color:#2d7a2d; font-family:monospace; font-size:11px; letter-spacing:3px; margin-bottom:10px; opacity:.7; }
  .camera-container { position:relative; width:100%; max-width:420px; height:72vh; }
  #video { width:100%; height:100%; object-fit:cover; transform:scaleX(-1); border-radius:10px; opacity:.55; }
  #canvas { position:absolute; top:0; left:0; width:100%; height:100%; border-radius:10px; }
  .status { margin-top:10px; color:#2d7a2d; font-family:monospace; font-size:11px; letter-spacing:2px; opacity:.7; }
  #start-btn {
    margin-top:14px; background:transparent;
    border:1px solid #2d7a2d; color:#2d7a2d;
    font-family:monospace; font-size:13px; letter-spacing:3px;
    padding:10px 28px; border-radius:6px; cursor:pointer;
  }
</style>
</head>
<body>
<div class="pages">

  <!-- PAGE 1 -->
  <div class="page">
    <div class="pepe-wrap">
      <div class="pepe-glow"></div>
      <img class="pepe-img" src="https://i.ibb.co/WW50MJxt/pepe.gif" alt="Pepe"/>
    </div>
    <div class="line"></div>
    <div class="username">@libappso</div>
    <div class="swipe-hint">▼ свайп вниз</div>
  </div>

  <!-- PAGE 2 -->
  <div class="page" id="page2">
    <div class="cam-label">⬡ SKELETON TRACKER ⬡</div>
    <div class="camera-container">
      <video id="video" playsinline autoplay muted></video>
      <canvas id="canvas"></canvas>
    </div>
    <div class="status" id="status">Нажми чтобы начать</div>
    <button id="start-btn" onclick="startCam()">▶ ЗАПУСТИТЬ</button>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose@0.5/pose.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4/hands.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>

<script>
const tg = window.Telegram?.WebApp;
if (tg) tg.expand();

const video    = document.getElementById('video');
const canvas   = document.getElementById('canvas');
const ctx      = canvas.getContext('2d');
const statusEl = document.getElementById('status');
const startBtn = document.getElementById('start-btn');

let poseLandmarks  = null;
let handsLandmarks = [];
let started = false;

// --- Pose ---
const pose = new Pose({ locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/pose@0.5/${f}` });
pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
pose.onResults(r => { poseLandmarks = r.poseLandmarks || null; });

// --- Hands ---
const hands = new Hands({ locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4/${f}` });
hands.setOptions({ maxNumHands: 2, modelComplexity: 0, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
hands.onResults(r => { handsLandmarks = r.multiHandLandmarks || []; });

function draw() {
  canvas.width  = video.videoWidth  || canvas.offsetWidth;
  canvas.height = video.videoHeight || canvas.offsetHeight;
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (poseLandmarks) {
    drawConnectors(ctx, poseLandmarks, POSE_CONNECTIONS,
      { color: '#00ff44', lineWidth: 2 });
    drawLandmarks(ctx, poseLandmarks,
      { color: '#00ff44', fillColor: '#003300', lineWidth: 1, radius: 5 });
    statusEl.textContent = '✓ ОБНАРУЖЕН';
    statusEl.style.color = '#00ff44';
  } else {
    statusEl.textContent = '⟳ ПОИСК...';
    statusEl.style.color = 'rgba(45,122,45,.6)';
  }

  for (const h of handsLandmarks) {
    drawConnectors(ctx, h, HAND_CONNECTIONS,
      { color: '#00eeff', lineWidth: 2 });
    drawLandmarks(ctx, h,
      { color: '#00eeff', fillColor: '#003333', lineWidth: 1, radius: 3 });
  }
}

async function startCam() {
  if (started) return;
  started = true;
  startBtn.style.display = 'none';
  statusEl.textContent = '⟳ ЗАГРУЗКА...';

  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } }
    });
    video.srcObject = stream;

    const camera = new Camera(video, {
      onFrame: async () => {
        await pose.send({ image: video });
        await hands.send({ image: video });
        draw();
      },
      width: 640, height: 480
    });
    camera.start();

  } catch(e) {
    statusEl.textContent = '✗ НЕТ ДОСТУПА К КАМЕРЕ';
    statusEl.style.color = '#ff4444';
    startBtn.style.display = 'block';
    started = false;
  }
}
</script>
</body>
</html>
