<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AI Scan</title>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
<style>
    body { margin: 0; background: #000; color: #0f0; font-family: inset, monospace; overflow: hidden; }
    #video { width: 100vw; height: 80vh; object-fit: cover; position: absolute; }
    #canvas { width: 100vw; height: 80vh; position: absolute; z-index: 10; }
    .ui { position: absolute; bottom: 0; width: 100%; height: 20vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #0a0a0a; border-top: 1px solid #0f0; }
    button { background: none; border: 1px solid #0f0; color: #0f0; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin: 5px; }
    #status { font-size: 10px; margin-bottom: 5px; color: #0f0; opacity: 0.7; }
    .mirror { transform: scaleX(-1); }
</style>
</head>
<body>

<video id="video" playsinline autoplay muted></video>
<canvas id="canvas"></canvas>

<div class="ui">
    <div id="status">Инициализация ИИ...</div>
    <div style="display: flex;">
        <button onclick="startApp()">ПУСК</button>
        <button id="flip-btn" onclick="flipCamera()" style="display: none;">СМЕНИТЬ КАМЕРУ</button>
    </div>
</div>

<script>
let model, currentStream, video = document.getElementById('video'), canvas = document.getElementById('canvas'), ctx = canvas.getContext('2d'), status = document.getElementById('status'), flipBtn = document.getElementById('flip-btn'), facingMode = "user";

async function loadModel() {
    status.innerText = "ЗАГРУЗКА НЕЙРОСЕТИ...";
    model = await cocoSsd.load();
    status.innerText = "ИИ ГОТОВ. ЖМИ ПУСК";
}
loadModel();

async function startApp() {
    await setupCamera();
    flipBtn.style.display = "block";
    detect();
}

async function setupCamera() {
    if (currentStream) currentStream.getTracks().forEach(t => t.stop());
    
    const constraints = { video: { facingMode: facingMode } };
    currentStream = await navigator.mediaDevices.getUserMedia(constraints);
    video.srcObject = currentStream;

    if (facingMode === "user") {
        video.classList.add('mirror');
        canvas.classList.add('mirror');
    } else {
        video.classList.remove('mirror');
        canvas.classList.remove('mirror');
    }
}

async function flipCamera() {
    facingMode = facingMode === "user" ? "environment" : "user";
    await setupCamera();
}

async function detect() {
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    
    const predictions = await model.detect(video);
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    predictions.forEach(p => {
        ctx.strokeStyle = "#0f0";
        ctx.lineWidth = 4;
        ctx.strokeRect(p.bbox[0], p.bbox[1], p.bbox[2], p.bbox[3]);
        
        ctx.fillStyle = "#0f0";
        ctx.font = "24px Arial";
        ctx.fillText(p.class.toUpperCase(), p.bbox[0], p.bbox[1] > 20 ? p.bbox[1] - 10 : 20);
    });
    
    requestAnimationFrame(detect);
}
</script>
</body>
</html>
