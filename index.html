<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pepe Precision Tracker</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; overflow: hidden; }
        
        /* Сетка на фоне */
        .grid {
            position: fixed; inset: 0;
            background-image: linear-gradient(rgba(0,255,0,0.05) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0,255,0,0.05) 1px, transparent 1px);
            background-size: 40px 40px; pointer-events: none;
        }

        .container { position: relative; width: 100vw; height: 100vh; display: flex; flex-direction: column; }
        
        #video { position: absolute; width: 100%; height: 100%; object-fit: cover; opacity: 0.3; filter: grayscale(1); }
        #canvas { position: absolute; width: 100%; height: 100%; object-fit: cover; z-index: 2; }

        /* Интерфейс поверх */
        .hud {
            position: absolute; top: 20px; left: 20px; z-index: 10;
            text-shadow: 0 0 10px #0f0; pointer-events: none;
        }
        .hud-item { margin-bottom: 5px; font-size: 12px; letter-spacing: 1px; }
        .value { color: #fff; }

        .controls {
            position: absolute; bottom: 30px; left: 0; width: 100%;
            display: flex; justify-content: center; gap: 20px; z-index: 10;
        }
        button {
            background: rgba(0,20,0,0.8); border: 1px solid #0f0; color: #0f0;
            padding: 12px 20px; font-family: monospace; cursor: pointer;
            box-shadow: 0 0 10px rgba(0,255,0,0.3); transition: 0.3s;
        }
        button:active { transform: scale(0.9); background: #0f0; color: #000; }
    </style>
</head>
<body>
    <div class="grid"></div>
    <div class="container">
        <video id="video" playsinline muted></video>
        <canvas id="canvas"></canvas>

        <div class="hud">
            <div class="hud-item">STATUS: <span id="st" class="value">IDLE</span></div>
            <div class="hud-item">FPS: <span id="fps" class="value">0</span></div>
            <div class="hud-item">EST. HEIGHT: <span id="height" class="value">---</span> cm</div>
            <div class="hud-item">POS_X: <span id="posx" class="value">0</span></div>
            <div class="hud-item">POS_Y: <span id="posy" class="value">0</span></div>
        </div>

        <div class="controls">
            <button id="start-btn" onclick="init()">START SCAN</button>
            <button onclick="switchCamera()">FLIP CAM</button>
        </div>
    </div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let currentFacingMode = 'user';
let lastTime = 0;
let started = false;

// Настройка детектора
const pose = new Pose({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}` });
pose.setOptions({
    modelComplexity: 1, // 1 - баланс между 60fps и точностью
    smoothLandmarks: true,
    minDetectionConfidence: 0.6,
    minTrackingConfidence: 0.6
});

pose.onResults(onResults);

function onResults(results) {
    // Считаем FPS
    const now = performance.now();
    const fps = Math.round(1000 / (now - lastTime));
    lastTime = now;
    document.getElementById('fps').textContent = fps;

    ctx.save();
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    if (results.poseLandmarks) {
        document.getElementById('st').textContent = 'TRACKING';
        
        // Рисуем детальный скелет
        drawConnectors(ctx, results.poseLandmarks, POSE_CONNECTIONS, {color: '#00FF44', lineWidth: 2});
        drawLandmarks(ctx, results.poseLandmarks, {
            color: '#FF0000', fillColor: '#00FF44', lineWidth: 1, radius: (data) => {
                return data.from.visibility > 0.5 ? 4 : 0; // Скрываем невидимые точки
            }
        });

        calculateMetrics(results.poseLandmarks);
    } else {
        document.getElementById('st').textContent = 'SEARCHING...';
    }
    ctx.restore();
}

function calculateMetrics(lm) {
    // 1. Координаты центра (таз)
    const centerX = lm[24].x.toFixed(2);
    const centerY = lm[24].y.toFixed(2);
    document.getElementById('posx').textContent = centerX;
    document.getElementById('posy').textContent = centerY;

    // 2. Расчет роста (упрощенная модель)
    // Измеряем расстояние в "попугаях" камеры между макушкой (0) и пяткой (32)
    const head = lm[0];
    const ankle = lm[28];
    const dist = Math.sqrt(Math.pow(head.x - ankle.x, 2) + Math.pow(head.y - ankle.y, 2));
    
    // Коэффициент пересчета (зависит от fov камеры, 1.0 экрана ~ 170-180см)
    // Это примерная оценка, точность зависит от расстояния до камеры
    const estHeight = Math.round(dist * 210); 
    document.getElementById('height').textContent = estHeight;
}

async function init() {
    if(started) return;
    started = true;
    document.getElementById('start-btn').style.display = 'none';
    
    const camera = new Camera(video, {
        onFrame: async () => {
            await pose.send({image: video});
        },
        width: 1280, height: 720
    });
    camera.start();
}

async function switchCamera() {
    currentFacingMode = currentFacingMode === 'user' ? 'environment' : 'user';
    if (!started) return;
    
    // Перезапуск потока с новой камерой
    const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: currentFacingMode }
    });
    video.srcObject = stream;
    
    // Инверсия канваса только для селфи-камеры
    canvas.style.transform = currentFacingMode === 'user' ? 'scaleX(-1)' : 'scaleX(1)';
    video.style.transform = currentFacingMode === 'user' ? 'scaleX(-1)' : 'scaleX(1)';
}

// Адаптация размера
window.addEventListener('resize', () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});
window.dispatchEvent(new Event('resize'));
</script>
</body>
</html>
