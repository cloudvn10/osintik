<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR Виртуальный блок</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #222;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        /* Зеркалим канвас, чтобы было как в зеркале */
        .output_canvas {
            transform: scaleX(-1);
            max-width: 100%;
            max-height: 100vh;
        }
        #loading {
            position: absolute;
            color: white;
            font-family: sans-serif;
            font-size: 24px;
        }
    </style>
</head>
<body>

    <div id="loading">Загрузка нейросети и камеры... Разреши доступ к камере!</div>
    
    <video class="input_video" style="display: none;"></video>
    <canvas class="output_canvas" width="1280" height="720"></canvas>

    <script>
        const videoElement = document.querySelector('.input_video');
        const canvasElement = document.querySelector('.output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const loadingText = document.getElementById('loading');

        // Переменные нашего блока
        let blockX = 640;
        let blockY = 360;
        let blockSize = 100;
        let isPlaced = false;
        let clickCooldown = 0;

        // Функция, которая вызывается каждый кадр
        function onResults(results) {
            // Прячем текст загрузки, когда пошли кадры
            loadingText.style.display = 'none';

            // Очищаем канвас и рисуем кадр с камеры
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

            if (clickCooldown > 0) clickCooldown--;

            // Если в кадре найдена рука
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];
                const w = canvasElement.width;
                const h = canvasElement.height;

                // Рисуем скелет руки
                drawConnectors(canvasCtx, landmarks, HAND_CONNECTIONS, {color: '#00FF00', lineWidth: 4});
                drawLandmarks(canvasCtx, landmarks, {color: '#FF0000', lineWidth: 2, radius: 3});

                // Достаем координаты нужных точек (умножаем на ширину/высоту канваса)
                const x8 = landmarks[8].x * w, y8 = landmarks[8].y * h;   // Кончик указательного
                const x6 = landmarks[6].x * w, y6 = landmarks[6].y * h;   // Сустав указательного
                const x4 = landmarks[4].x * w, y4 = landmarks[4].y * h;   // Кончик большого
                const x12 = landmarks[12].x * w, y12 = landmarks[12].y * h; // Кончик среднего

                // 1. МАСШТАБ (расстояние между большим и средним пальцем)
                const ringDist = Math.hypot(x12 - x4, y12 - y4);
                
                if (!isPlaced) {
                    // Ограничиваем размер блока от 30 до 400 пикселей
                    blockSize = Math.max(30, Math.min(ringDist * 1.5, 400));
                    // 2. ПЕРЕМЕЩЕНИЕ (блок следует за кончиком указательного пальца)
                    blockX = x8;
                    blockY = y8;
                }

                // 3. КЛИК (указательный палец согнут вниз)
                if (y8 > y6 && clickCooldown === 0) {
                    isPlaced = !isPlaced; // Меняем состояние
                    clickCooldown = 15;   // Задержка
                }
            }

            // ОТРИСОВКА БЛОКА
            const x1 = blockX - blockSize / 2;
            const y1 = blockY - blockSize / 2;

            // Выбираем цвет: полупрозрачный зеленый в руке, красный - на экране
            canvasCtx.fillStyle = isPlaced ? 'rgba(255, 0, 0, 0.6)' : 'rgba(0, 255, 0, 0.6)';
            canvasCtx.fillRect(x1, y1, blockSize, blockSize);
            
            // Белая рамка
            canvasCtx.lineWidth = 4;
            canvasCtx.strokeStyle = 'white';
            canvasCtx.strokeRect(x1, y1, blockSize, blockSize);

            canvasCtx.restore();
        }

        // Настраиваем MediaPipe
        const hands = new Hands({locateFile: (file) => {
            return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
        }});
        hands.setOptions({
            maxNumHands: 1, // Ищем только одну руку
            modelComplexity: 1,
            minDetectionConfidence: 0.7,
            minTrackingConfidence: 0.7
        });
        hands.onResults(onResults);

        // Запускаем камеру
        const camera = new Camera(videoElement, {
            onFrame: async () => {
                await hands.send({image: videoElement});
            },
            width: 1280,
            height: 720
        });
        camera.start();
    </script>
</body>
</html>
