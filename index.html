<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AI Object Detector MAX</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>

<style>
    body { margin: 0; background: #000; color: #0f0; font-family: monospace; overflow: hidden; }
    #video { width: 100vw; height: 85vh; object-fit: cover; position: absolute; top: 0; left: 0; }
    #canvas { width: 100vw; height: 85vh; position: absolute; top: 0; left: 0; z-index: 10; }
    .ui { position: absolute; bottom: 0; width: 100%; height: 15vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #0a100a; border-top: 2px solid #2d7a2d; z-index: 20; }
    .btns { display: flex; gap: 10px; }
    button { background: #1a1a1a; border: 1px solid #0f0; color: #0f0; padding: 12px 24px; border-radius: 8px; font-size: 14px; font-weight: bold; cursor: pointer; }
    #status { font-size: 12px; margin-bottom: 8px; color: #00ff44; font-weight: bold; }
    .mirror { transform: scaleX(-1); }
</style>
</head>
<body>

<video id="video" playsinline autoplay muted></video>
<canvas id="canvas"></canvas>

<div class="ui">
    <div id="status">ЗАГРУЗКА УЛУЧШЕННОЙ ИИ... (МОЖЕТ ЗАНЯТЬ ВРЕМЯ)</div>
    <div class="btns">
        <button id="start-btn" onclick="startApp()" style="display: none;">ЗАПУСТИТЬ</button>
        <button id="flip-btn" onclick="flipCamera()" style="display: none;">СМЕНИТЬ КАМЕРУ</button>
    </div>
</div>

<script>
const tg = window.Telegram?.WebApp;
if (tg) tg.expand();

// Полный словарь всех 80 классов COCO-SSD
const RU_LABELS = {
    'person': 'ЧЕЛОВЕК', 'bicycle': 'ВЕЛОСИПЕД', 'car': 'МАШИНА', 'motorcycle': 'МОТОЦИКЛ', 'airplane': 'САМОЛЕТ', 
    'bus': 'АВТОБУС', 'train': 'ПОЕЗД', 'truck': 'ГРУЗОВИК', 'boat': 'ЛОДКА', 'traffic light': 'СВЕТОФОР', 
    'fire hydrant': 'ГИДРАНТ', 'stop sign': 'ЗНАК СТОП', 'parking meter': 'ПАРКОМАТ', 'bench': 'СКАМЕЙКА', 
    'bird': 'ПТИЦА', 'cat': 'КОШКА', 'dog': 'СОБАКА', 'horse': 'ЛОШАДЬ', 'sheep': 'ОВЦА', 'cow': 'КОРОВА', 
    'elephant': 'СЛОН', 'bear': 'МЕДВЕДЬ', 'zebra': 'ЗЕБРА', 'giraffe': 'ЖИРАФ', 'backpack': 'РЮКЗАК', 
    'umbrella': 'ЗОНТ', 'handbag': 'СУМКА', 'tie': 'ГАЛСТУК', 'suitcase': 'ЧЕМОДАН', 'frisbee': 'ФРИСБИ', 
    'skis': 'ЛЫЖИ', 'snowboard': 'СНОУБОРД', 'sports ball': 'МЯЧ', 'kite': 'ВОЗД. ЗМЕЙ', 'baseball bat': 'БИТА', 
    'baseball glove': 'ПЕРЧАТКА', 'skateboard': 'СКЕЙТБОРД', 'surfboard': 'СЕРФБОРД', 'tennis racket': 'РАКЕТКА', 
    'bottle': 'БУТЫЛКА', 'wine glass': 'БОКАЛ', 'cup': 'ЧАШКА', 'fork': 'ВИЛКА', 'knife': 'НОЖ', 'spoon': 'ЛОЖКА', 
    'bowl': 'МИСКА', 'banana': 'БАНАН', 'apple': 'ЯБЛОКО', 'sandwich': 'СЭНДВИЧ', 'orange': 'АПЕЛЬСИН', 
    'broccoli': 'БРОККОЛИ', 'carrot': 'МОРКОВЬ', 'hot dog': 'ХОТ-ДОГ', 'pizza': 'ПИЦЦА', 'donut': 'ПОНЧИК', 
    'cake': 'ТОРТ', 'chair': 'СТУЛ', 'couch': 'ДИВАН', 'potted plant': 'ЦВЕТОК', 'bed': 'КРОВАТЬ', 
    'dining table': 'СТОЛ', 'toilet': 'УНИТАЗ', 'tv': 'ТЕЛЕВИЗОР', 'laptop': 'НОУТБУК', 'mouse': 'МЫШКА', 
    'remote': 'ПУЛЬТ', 'keyboard': 'КЛАВИАТУРА', 'cell phone': 'ТЕЛЕФОН', 'microwave': 'МИКРОВОЛНОВКА', 
    'oven': 'ДУХОВКА', 'toaster': 'ТОСТЕР', 'sink': 'РАКОВИНА', 'refrigerator': 'ХОЛОДИЛЬНИК', 'book': 'КНИГА', 
    'clock': 'ЧАСЫ', 'vase': 'ВАЗА', 'scissors': 'НОЖНИЦЫ', 'teddy bear': 'ИГРУШКА', 'hair drier': 'ФЕН', 
    'toothbrush': 'ЗУБНАЯ ЩЕТКА'
};

let model, currentStream;
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const statusEl = document.getElementById('status');
const flipBtn = document.getElementById('flip-btn');
const startBtn = document.getElementById('start-btn');

let facingMode = "environment"; 
let lastDetections = []; // Хранилище для сглаживания кадров

async function loadModel() {
    try {
        // Загружаем более точную базу mobilenet_v2 вместо lite-версии
        model = await cocoSsd.load({ base: 'mobilenet_v2' });
        statusEl.innerText = "ИИ ГОТОВ (МАКСИМАЛЬНАЯ ТОЧНОСТЬ)";
        startBtn.style.display = "block";
    } catch (e) {
        statusEl.innerText = "ОШИБКА ЗАГРУЗКИ МОДЕЛИ";
    }
}
loadModel();

async function startApp() {
    startBtn.style.display = "none";
    flipBtn.style.display = "block";
    await setupCamera();
    detect();
}

async function setupCamera() {
    if (currentStream) {
        currentStream.getTracks().forEach(track => track.stop());
        video.srcObject = null;
    }
    
    const constraints = { video: { facingMode: facingMode } };

    try {
        currentStream = await navigator.mediaDevices.getUserMedia(constraints);
        video.srcObject = currentStream;

        await new Promise(resolve => {
            video.onloadedmetadata = () => { video.play(); resolve(); };
        });

        if (facingMode === "user") {
            video.classList.add('mirror');
            canvas.classList.add('mirror');
        } else {
            video.classList.remove('mirror');
            canvas.classList.remove('mirror');
        }
    } catch (err) {
        statusEl.innerText = "ОШИБКА ДОСТУПА К КАМЕРЕ";
    }
}

async function flipCamera() {
    statusEl.innerText = "ПЕРЕКЛЮЧЕНИЕ...";
    facingMode = facingMode === "user" ? "environment" : "user";
    lastDetections = []; // Сбрасываем кэш при смене камеры
    await setupCamera();
    statusEl.innerText = facingMode === "user" ? "РЕЖИМ: СЕЛФИ" : "РЕЖИМ: ОСНОВНАЯ";
}

async function detect() {
    if (!model) return;

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    
    const predictions = await model.detect(video);
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // Алгоритм сглаживания (Anti-Flicker)
    let currentDetections = [];
    
    predictions.forEach(p => {
        if (p.score < 0.50) return; // Снижен порог для лучшего захвата, модель точнее
        currentDetections.push({ bbox: p.bbox, class: p.class, score: p.score, life: 5 }); 
    });

    // Обновляем старые детекции
    lastDetections.forEach(oldDet => {
        const stillExists = currentDetections.some(newDet => newDet.class === oldDet.class && Math.abs(newDet.bbox[0] - oldDet.bbox[0]) < 50);
        if (!stillExists && oldDet.life > 0) {
            oldDet.life -= 1;
            currentDetections.push(oldDet); // Оставляем объект на экране, если он пропал на долю секунды
        }
    });

    lastDetections = currentDetections;

    // Отрисовка
    currentDetections.forEach(p => {
        const x = p.bbox[0];
        const y = p.bbox[1];
        const w = p.bbox[2];
        const h = p.bbox[3];

        const label = RU_LABELS[p.class] || p.class.toUpperCase();
        const scorePercent = Math.round(p.score * 100);
        const text = `${label} ${scorePercent}%`;

        ctx.strokeStyle = "#00ff44";
        ctx.lineWidth = 4;
        ctx.strokeRect(x, y, w, h);
        
        ctx.save();
        if (facingMode === "user") {
            ctx.translate(canvas.width, 0);
            ctx.scale(-1, 1);
            const mirroredX = canvas.width - x - ctx.measureText(text).width - 10;
            drawLabel(mirroredX, y, text);
        } else {
            drawLabel(x, y, text);
        }
        ctx.restore();
    });
    
    requestAnimationFrame(detect);
}

function drawLabel(x, y, text) {
    ctx.font = "bold 16px monospace";
    const textWidth = ctx.measureText(text).width;
    
    ctx.fillStyle = "#00ff44";
    ctx.fillRect(x, y > 25 ? y - 25 : y, textWidth + 10, 25);
    
    ctx.fillStyle = "#000";
    ctx.fillText(text, x + 5, y > 25 ? y - 8 : y + 18);
}
</script>
</body>
</html>
